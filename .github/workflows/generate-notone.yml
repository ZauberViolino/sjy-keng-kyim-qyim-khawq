name: Generate tone-free dictionaries

on:
  schedule:
    - cron: '0 0 * * *' # daily at 00:00 UTC
  workflow_dispatch: {}

# Allow workflow to write to repository so git push can succeed with GITHUB_TOKEN
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run strip_tones.py
        run: |
          python scripts/strip_tones.py sjy-keng-kyim-qyim-khawq-terra.dict.yaml

      - name: Create Pull Request with changes
        id: create_pr
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Auto-generate tone-free dictionaries"
          committer: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          branch: "auto/generate-notone"
          title: "Auto-generate tone-free dictionaries"
          body: |
            This pull request updates the tone-free dictionary files generated by `scripts/strip_tones.py`.
          base: main
          labels: automated

      - name: Merge the created Pull Request
        uses: peter-evans/merge-pull-request@v2
        if: steps.create_pr.outputs.pull-request-number != ''
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ steps.create_pr.outputs.pull-request-number }}
          merge-method: merge
          commit-title: "Merge auto-generated tone-free dictionaries"
          merge-branch: auto/generate-notone
